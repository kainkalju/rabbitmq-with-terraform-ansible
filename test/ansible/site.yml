---
- name: Install Docker on test client
  hosts: test_clients
  become: true
  roles:
    - docker

- name: Configure syslog logging for Docker on test client
  hosts: test_clients
  become: true
  roles:
    - docker-syslog

- name: Deploy RabbitMQ test producer/consumer
  hosts: test_clients
  become: true
  roles:
    - rabbitmq-test
