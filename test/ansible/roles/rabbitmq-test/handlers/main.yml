---
- name: Restart docker-compose@rabbitmq-test
  ansible.builtin.systemd:
    name: docker-compose@rabbitmq-test
    state: restarted
    daemon_reload: true

- name: Restart docker-compose@rabbitmq-test-scenarios
  ansible.builtin.systemd:
    name: docker-compose@rabbitmq-test-scenarios
    state: restarted
    daemon_reload: true
